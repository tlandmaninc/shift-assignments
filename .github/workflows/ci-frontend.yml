name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Security audit (npm)
        run: |
          cd frontend
          npm audit --audit-level=high --omit=dev || echo "::warning::npm audit found vulnerabilities"

      - name: Run tests
        run: cd frontend && npm test -- --watchAll=false --passWithNoTests

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Trigger Vercel dev deploy
        run: curl -s "${{ secrets.VERCEL_DEPLOY_HOOK_DEV }}"

      - name: Dev deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Frontend Dev Deployment Triggered

          Verify the dev frontend is running correctly:

          - [App](https://shift-assignments-frontend-dev.vercel.app)
          - [Login page](https://shift-assignments-frontend-dev.vercel.app/login)

          > Vercel typically deploys in under 1 minute.

          Once dev is verified, the prod deployment will follow (requires environment approval).
          EOF

  deploy-prod:
    name: Deploy Frontend to Prod
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production-frontend
    steps:
      - name: Trigger Vercel prod deploy
        run: curl -s "${{ secrets.VERCEL_DEPLOY_HOOK_PROD }}"

      - name: Deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Frontend Production Deployment Triggered

          - [App](https://shift-assignments.vercel.app)
          EOF
