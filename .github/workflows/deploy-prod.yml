name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to deploy to production'
        required: true
        type: choice
        options:
          - backend
          - frontend
          - both

jobs:
  deploy-backend:
    name: Deploy Backend to Prod
    runs-on: ubuntu-latest
    if: inputs.service == 'backend' || inputs.service == 'both'
    environment: production-backend
    steps:
      - name: Trigger Render prod deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"

      - name: Deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Backend Production Deployment Triggered

          - [Health check](https://shift-assignments-backend-prod.onrender.com/health)

          > Render free tier may take 1-2 minutes to deploy.
          EOF

  deploy-frontend:
    name: Deploy Frontend to Prod
    runs-on: ubuntu-latest
    if: inputs.service == 'frontend' || inputs.service == 'both'
    environment: production-frontend
    steps:
      - name: Trigger Vercel prod deploy
        run: curl -s "${{ secrets.VERCEL_DEPLOY_HOOK_PROD }}"

      - name: Deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Frontend Production Deployment Triggered

          - [App](https://shift-assignments-frontend-prod.vercel.app)
          EOF
