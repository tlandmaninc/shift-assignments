# Development Docker Compose for ECT Shift Assignment App
# Usage: docker compose up --build
# Hot-reload is enabled for both backend and frontend via volume mounts.

services:
  # FastAPI backend with Python 3.12 (uv)
  # Volume mounts enable live code reload during development
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app:/app/app    # Mount app source for hot-reload
      - ./backend/data:/app/data  # Persist local data files
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Next.js frontend with Node.js 20
  # WATCHPACK_POLLING enables file-watching inside Docker on some OS
  frontend:
    build: ./frontend
    command: ["npx", "next", "dev", "--turbopack"]
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app                # mount source for hot-reload
      - /app/node_modules              # keep container's node_modules
      - /app/.next                     # keep container's build cache
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      backend:
        condition: service_healthy
